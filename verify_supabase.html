<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase connection check</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 3rem auto; padding: 1rem; }
      label { display: block; margin-top: 1rem; font-weight: 600; }
      input { box-sizing: border-box; width: 100%; margin-top: .4rem; padding: .7rem; }
      button { margin-top: 1rem; padding: .7rem 1rem; }
      pre { white-space: pre-wrap; background: #f4f4f5; padding: 1rem; border-radius: .5rem; }
    </style>
  </head>
  <body>
    <h1>Supabase connection check</h1>
    <p>
      Enter a project URL and public anon key to perform a read-only health
      request. Values remain in this page and are not stored.
    </p>

    <label for="url">Project URL</label>
    <input id="url" type="url" placeholder="https://your-project.supabase.co" />

    <label for="key">Public anon key</label>
    <input id="key" type="password" autocomplete="off" />

    <button id="test" type="button">Test connection</button>
    <pre id="result" aria-live="polite">Not tested</pre>

    <script>
      document.getElementById('test').addEventListener('click', async () => {
        const url = document.getElementById('url').value.trim();
        const key = document.getElementById('key').value.trim();
        const result = document.getElementById('result');

        if (!url || !key) {
          result.textContent = 'Enter both values.';
          return;
        }

        result.textContent = 'Checking…';
        try {
          const client = window.supabase.createClient(url, key);
          const { error } = await client.from('return_items').select('id').limit(1);
          result.textContent = error
            ? `Supabase responded: ${error.message}`
            : 'Connection succeeded and the table is readable under current RLS policies.';
        } catch (error) {
          result.textContent = `Connection failed: ${error.message}`;
        }
      });
    </script>
  </body>
</html>
